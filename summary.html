<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tickets — Nightlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { ink: '#12121F', paper: '#F5F3EC', gold: '#F2B705', card: '#1C1D2E' },
      fontFamily: { display: ['"Bebas Neue"', 'sans-serif'], sans: ['"Work Sans"', 'sans-serif'] }
    } }
  }
</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-ink text-paper font-sans">

  <header class="border-b border-white/10 sticky top-0 bg-ink/90 backdrop-blur z-30">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-display text-3xl tracking-wide text-gold">NIGHTLIST</a>
      <nav class="hidden sm:flex gap-8 text-sm font-medium text-paper/70">
        <a href="index.html" class="hover:text-paper transition">Events</a>
        <a href="booking.html" class="hover:text-paper transition">Book</a>
        <a href="summary.html" class="text-gold">My Tickets</a>
      </nav>
    </div>
  </header>

  <section class="max-w-3xl mx-auto px-6 pt-14 pb-24">
    <p class="eyebrow">CONFIRMED</p>
    <h1 class="font-display text-5xl sm:text-6xl mt-2 mb-8">Your tickets</h1>

    <div id="ticket-list" class="space-y-8">
      <!-- filled by JS -->
    </div>

    <p id="empty-state" class="hidden text-paper/50 mt-4">
      No tickets yet. <a href="index.html" class="text-gold underline">Browse events</a> to book one.
    </p>
  </section>

<script src="js/script.js"></script>
<script>renderTicketHistory();</script>
</body>
</html>
